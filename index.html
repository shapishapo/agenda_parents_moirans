<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda Parents</title>

<script src="https://cdn.jsdelivr.net/npm/rrule@2.7.1/dist/es5/rrule.min.js"></script>

<style>
body {
    font-family: Arial;
    display: flex;
    gap: 20px;
    padding: 20px;
    background: #f4f6f8;
}
.colonne {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
h1 { font-size: 3em; text-align: center; }
h2 { text-align: center; color: gray; }
.evenement {
    font-size: 1.6em;
    background: #e3f2fd;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="colonne">
    <h1>Aujourd'hui</h1>
    <h2 id="date-aujourdhui"></h2>
    <div id="today"></div>
</div>

<div class="colonne">
    <h1>Demain</h1>
    <h2 id="date-demain"></h2>
    <div id="tomorrow"></div>
</div>

<script>
// 🔥 COLLE TON LIEN ICS ICI (adresse secrète Google)
const ICS_URL = "https://corsproxy.io/?" + encodeURIComponent("https://calendar.google.com/calendar/ical/2d219aecd1294a5dc26a6e8290998a7891d598c3c61bf5ca6b0f2d73e0cf902a%40group.calendar.google.com/public/basic.ics");

// -------- FORMAT --------

function formatDate(date) {
    return date.toLocaleDateString('fr-FR', {
        weekday: 'long',
        day: 'numeric',
        month: 'long'
    });
}

function formatHeure(date) {
    return date.toLocaleTimeString('fr-FR', {
        hour: '2-digit',
        minute: '2-digit'
    });
}

// -------- PARSE ICS --------

function parseICS(data) {
    const events = [];
    const lignes = data.split(/\r?\n/);

    let event = null;

    lignes.forEach(line => {
        line = line.trim();

        if (line === "BEGIN:VEVENT") event = {};
        else if (line === "END:VEVENT") {
            events.push(event);
            event = null;
        }
        else if (event) {
            if (line.startsWith("DTSTART")) event.start = line.split(":")[1];
            if (line.startsWith("DTEND")) event.end = line.split(":")[1];
            if (line.startsWith("SUMMARY")) event.summary = line.split(":")[1];
            if (line.startsWith("RRULE")) event.rrule = line.substring(6);
        }
    });

    return events;
}

// -------- DATE ICS --------

function parseDateICS(str) {
    return new Date(
        str.slice(0,4)+"-"+str.slice(4,6)+"-"+str.slice(6,8)+"T"+
        str.slice(9,11)+":"+str.slice(11,13)+":00"
    );
}

// -------- GÉNÉRATION OCCURRENCES --------

function generateOccurrences(event, dateStart, dateEnd) {
    if (!event.rrule) {
        const d = parseDateICS(event.start);
        return [{ date: d, event }];
    }

    const options = RRule.parseString(event.rrule);
    options.dtstart = parseDateICS(event.start);

    const rule = new RRule(options);

    const dates = rule.between(dateStart, dateEnd, true);

    return dates.map(d => ({
        date: d,
        event
    }));
}

// -------- AFFICHAGE --------

function afficher(events, dateRef, containerId) {

    const startDay = new Date(dateRef);
    startDay.setHours(0,0,0,0);

    const endDay = new Date(dateRef);
    endDay.setHours(23,59,59,999);

    const container = document.getElementById(containerId);
    container.innerHTML = "";

    let occurrences = [];

    events.forEach(event => {
        occurrences = occurrences.concat(
            generateOccurrences(event, startDay, endDay)
        );
    });

    occurrences.sort((a,b) => a.date - b.date);

    if (occurrences.length === 0) {
        container.innerHTML = "<div>Aucun événement</div>";
        return;
    }

    occurrences.forEach(o => {
        const div = document.createElement("div");
        div.className = "evenement";

        const start = o.date;
        const end = o.event.end ? parseDateICS(o.event.end) : null;

        div.innerHTML =
            `${formatHeure(start)} - ${end ? formatHeure(end) : ""} : ${o.event.summary}`;

        container.appendChild(div);
    });
}

// -------- MAIN --------

async function charger() {
    const res = await fetch(ICS_URL);
    const text = await res.text();

    const events = parseICS(text);

    const today = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    document.getElementById("date-aujourdhui").textContent = formatDate(today);
    document.getElementById("date-demain").textContent = formatDate(tomorrow);

    afficher(events, today, "today");
    afficher(events, tomorrow, "tomorrow");
}

charger();
setInterval(charger, 300000);

</script>

</body>
</html>
