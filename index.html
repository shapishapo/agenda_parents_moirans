<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda Parents</title>

<style>
body {
    font-family: Arial;
    display: flex;
    flex-wrap: wrap; /* ✅ AJOUT : permet d’avoir 2 lignes (haut + bas) */
    gap: 20px;
    padding: 20px;
    background: #f4f6f8;
}

.colonne {
    flex: 1 1 45%; /* ✅ AJOUT : 2 colonnes par ligne */
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    font-size: 3em;
    text-align: center;
}

h2 {
    text-align: center;
    color: gray;
}

.evenement {
    font-size: 1.8em;
    background: #e3f2fd;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.vide {
    text-align: center;
    font-size: 1.5em;
    color: gray;
}

/* ✅ AJOUT : style pour les nouvelles zones */
.zone-info {
    font-size: 2em;
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- =========================
     LIGNE 1 : AGENDA CLASSIQUE
========================= -->

<div class="colonne">
    <h1>Aujourd'hui</h1>
    <h2 id="date-aujourdhui"></h2>
    <div id="today"></div>
</div>

<div class="colonne">
    <h1>Demain</h1>
    <h2 id="date-demain"></h2>
    <div id="tomorrow"></div>
</div>

<!-- =========================
     LIGNE 2 : NOUVELLES ZONES
========================= -->

<!-- ✅ AJOUT : événements "toute la journée" -->
<div class="colonne">
    <h1>À noter aujourd’hui</h1>
    <div id="all-day-events" class="zone-info"></div>
</div>

<!-- ✅ AJOUT : message personnalisable -->
<div class="colonne">
    <h1>Information importante</h1>

    <!-- contenteditable = modifiable directement à l'écran -->
    <div id="info-perso" class="zone-info" contenteditable="true">
        Penser à prendre les médicaments à 18h
    </div>
</div>

<script>

// 🔑 A REMPLIR
const API_KEY = "TA_CLE_API_ICI";
const CALENDAR_ID = "TON_CALENDAR_ID_ICI";

// -------- FORMAT --------

function formatDate(date) {
    return date.toLocaleDateString('fr-FR', {
        weekday: 'long',
        day: 'numeric',
        month: 'long'
    });
}

function formatHeure(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleTimeString('fr-FR', {
        hour: '2-digit',
        minute: '2-digit'
    });
}

// -------- API GOOGLE --------

async function recupererEvenements() {

    const now = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(now.getDate() + 2);

    const timeMin = now.toISOString();
    const timeMax = tomorrow.toISOString();

    const url =
        `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events` +
        `?key=${API_KEY}` +
        `&timeMin=${timeMin}` +
        `&timeMax=${timeMax}` +
        `&singleEvents=true` +
        `&orderBy=startTime`;

    const response = await fetch(url);
    const data = await response.json();

    return data.items || [];
}

// -------- AFFICHAGE CLASSIQUE --------

function afficher(events, dateRef, containerId) {

    const container = document.getElementById(containerId);
    container.innerHTML = "";

    const filtered = events.filter(e => {
        const d = new Date(e.start.dateTime || e.start.date);
        return d.toDateString() === dateRef.toDateString();
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div class="vide">Aucun événement</div>';
        return;
    }

    filtered.forEach(e => {

        const div = document.createElement("div");
        div.className = "evenement";

        const start = e.start.dateTime || e.start.date;
        const end = e.end.dateTime || e.end.date;

        const heureDebut = e.start.dateTime ? formatHeure(start) : "Toute la journée";
        const heureFin = e.end.dateTime ? formatHeure(end) : "";

        div.innerHTML =
            `<strong>${heureDebut} - ${heureFin}</strong><br>${e.summary || "Événement"}`;

        container.appendChild(div);
    });
}

// =========================
// ✅ AJOUT : EVENEMENTS JOURNEE ENTIERE
// =========================

function afficherAllDay(events) {

    const container = document.getElementById("all-day-events");
    container.innerHTML = "";

    const today = new Date();

    // on filtre uniquement les événements sans heure (date seule)
    const allDay = events.filter(e => {
        return e.start.date &&
               new Date(e.start.date).toDateString() === today.toDateString();
    });

    if (allDay.length === 0) {
        container.innerHTML = "Aucun événement";
        return;
    }

    allDay.forEach(e => {
        const div = document.createElement("div");
        div.textContent = e.summary;
        container.appendChild(div);
    });
}

// -------- MAIN --------

async function charger() {

    try {

        const events = await recupererEvenements();

        const today = new Date();
        const tomorrow = new Date();
        tomorrow.setDate(today.getDate() + 1);

        document.getElementById("date-aujourdhui").textContent = formatDate(today);
        document.getElementById("date-demain").textContent = formatDate(tomorrow);

        afficher(events, today, "today");
        afficher(events, tomorrow, "tomorrow");

        // ✅ AJOUT : affichage événements journée entière
        afficherAllDay(events);

    } catch (e) {
        console.error(e);
    }
}

// refresh
charger();
setInterval(charger, 5 * 60 * 1000);

</script>

</body>
</html>
