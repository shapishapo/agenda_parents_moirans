<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda Parents</title>

<style>
body {
    font-family: Arial;
    display: flex; 
    flex-wrap: wrap; /* ✅ AJOUT : permet d’avoir 2 lignes (haut + bas) */
    gap: 5px; 
    padding: 5px;
    background: #f4f6f8;
}

.colonne {
    flex: 1 1 45%; /* ✅ AJOUT : 2 colonnes par ligne */
    background: white;
    padding: 5px;
    border-radius: 5px;
}

h1 {
    font-size: 2.5em;
    text-align: center;
}

h2 {
    text-align: center;
    color: gray;
}

.evenement {
    font-size: 2em;
    background: #e3f2fd;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.vide {
    text-align: center;
    font-size: 2em;
    color: gray;
}

/* ✅ AJOUT : style pour les nouvelles zones */
.zone-info {
    font-size: 2em;
    text-align: center;
    margin-top: 5px;
}
</style>
</head>

<body>

<!-- =========================
     LIGNE 1 : AGENDA CLASSIQUE
========================= -->

<div class="colonne">
    <h1>Aujourd'hui</h1>
    <h2 id="date-aujourdhui"></h2>
    <div id="today"></div>
</div>

<div class="colonne">
    <h1>Demain</h1>
    <h2 id="date-demain"></h2>
    <div id="tomorrow"></div>
</div>

<!-- =========================
     LIGNE 2 : NOUVELLES ZONES 🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥
========================= -->

<!-- ✅ AJOUT : événements "toute la journée" -->
<div class="colonne">
    <h1>Poubelle de tri ?</h1>
</div>

<!-- ✅ AJOUT : message personnalisable -->
<div class="colonne">
    <h1>Penser à marcher !</h1>

</div>

<script>

// 🔑 A REMPLIR
const API_KEY = "AIzaSyD2bCeEjH_nj_ln0QvuscFRszraGISiWuA";
const CALENDAR_ID = "2d219aecd1294a5dc26a6e8290998a7891d598c3c61bf5ca6b0f2d73e0cf902a@group.calendar.google.com";

// -------- FORMAT --------

function formatDate(date) {
    return date.toLocaleDateString('fr-FR', {
        weekday: 'long',
        day: 'numeric',
        month: 'long'
    });
}

function formatHeure(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleTimeString('fr-FR', {
        hour: '2-digit',
        minute: '2-digit'
    });
}

// -------- API GOOGLE --------

async function recupererEvenements() {

 const now = new Date();

// ✅ début de la journée (00:00)
const startOfDay = new Date();
startOfDay.setHours(0, 0, 0, 0);

// ✅ fin de demain (23:59)
const endOfTomorrow = new Date();
endOfTomorrow.setDate(now.getDate() + 1);
endOfTomorrow.setHours(23, 59, 59, 999);

const timeMin = startOfDay.toISOString();
const timeMax = endOfTomorrow.toISOString();

    const url =
        `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events` +
        `?key=${API_KEY}` +
        `&timeMin=${timeMin}` +
        `&timeMax=${timeMax}` +
        `&singleEvents=true` +
        `&orderBy=startTime`;

    const response = await fetch(url);
    const data = await response.json();

    return data.items || [];
}

// -------- AFFICHAGE AVANCE --> EVENEMENT "TOUTE LA JOURNEE" --------

function afficher(events, dateRef, containerId) {

    const container = document.getElementById(containerId);
    container.innerHTML = "";

    const dateStr = dateRef.toISOString().split("T")[0];

    const filtered = events.filter(e => {

        // =========================
        // CAS 1 : événement avec heure
        // =========================
        if (e.start.dateTime) {
            const d = new Date(e.start.dateTime);
            return d.toDateString() === dateRef.toDateString();
        }

        // =========================
        // CAS 2 : événement toute la journée (CORRECTION)
        // =========================
        if (e.start.date && e.end.date) {

            const start = e.start.date;
            const end = e.end.date;

            // vérifier si dateRef est dans l'intervalle
            return dateStr >= start && dateStr < end;
        }

        return false;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div class="vide">Aucun événement</div>';
        return;
    }

    filtered.forEach(e => {

        const div = document.createElement("div");
        div.className = "evenement";

        // =========================
        // AFFICHAGE
        // =========================

        if (e.start.dateTime) {
            const heureDebut = formatHeure(e.start.dateTime);
            const heureFin = formatHeure(e.end.dateTime);

            div.innerHTML =
                `<strong>${heureDebut} - ${heureFin}</strong><br>${e.summary || "Événement"}`;
        } else {
            // toute la journée
            div.innerHTML =
                `<strong>Toute la journée</strong><br>${e.summary || "Événement"}`;
        }

        container.appendChild(div);
    });
}


// =========================
// ✅ AJOUT : EVENEMENTS JOURNEE ENTIERE en EXCLUANT LES EVENEMENTS "JOURNEE ENTIERE" ✅
// =========================

function afficherAllDay(events) {

    const container = document.getElementById("all-day-events");
    container.innerHTML = "";

    const today = new Date();

    // on filtre uniquement les événements sans heure (date seule)
    const allDay = events.filter(e => {
        return e.start.date &&
               new Date(e.start.date).toDateString() === today.toDateString();
    });

    if (allDay.length === 0) {
        container.innerHTML = "Aucun événement";
        return;
    }

    allDay.forEach(e => {
        const div = document.createElement("div");
        div.textContent = e.summary;
        container.appendChild(div);
    });
}


// -------- MAIN --------

async function charger() {

    try {

        const events = await recupererEvenements();

        const today = new Date();
        const tomorrow = new Date();
        tomorrow.setDate(today.getDate() + 1);

        document.getElementById("date-aujourdhui").textContent = formatDate(today);
        document.getElementById("date-demain").textContent = formatDate(tomorrow);

        afficher(events, today, "today");
        afficher(events, tomorrow, "tomorrow");

        // ✅ AJOUT : affichage événements journée entière
        afficherAllDay(events);

    } catch (e) {
        console.error(e);
    }
}

// refresh
charger();
setInterval(charger, 5 * 60 * 1000);

</script>

</body>
</html>
