<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Senior</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: space-around;
        }
        .colonne {
            width: 45%;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        h2 {
            text-align: center;
            font-size: 1.5em;
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .evenement {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #e8f4fc;
            border-radius: 5px;
            font-size: 1.8em;
        }
        .heure {
            font-weight: bold;
            color: #2980b9;
        }
        .vide {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            font-size: 1.5em;
        }
    </style>
    <!-- Ajout de la bibliothèque ical.js -->
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.4.0/build/ical.min.js"></script>
</head>
<body>
    <div class="colonne" id="aujourdhui">
        <h1>Aujourd'hui</h1>
        <h2 id="date-aujourdhui"></h2>
        <div id="evenements-aujourdhui"></div>
    </div>
    <div class="colonne" id="demain">
        <h1>Demain</h1>
        <h2 id="date-demain"></h2>
        <div id="evenements-demain"></div>
    </div>

    <script>
        // Fonction pour formater la date (ex: "Lundi 23 mars")
        function formaterDate(date) {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            return date.toLocaleDateString('fr-FR', options);
        }

        // Fonction pour formater l'heure (ex: "09:00")
        function formaterHeure(date) {
            return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }

        // Fonction pour charger et parser le fichier ICS
        async function chargerEvenementsICS(urlICS) {
            try {
                const response = await fetch(urlICS);
                const icsData = await response.text();

                // Parser le fichier ICS avec ical.js
                const jcalData = ICAL.parse(icsData);
                const vcalendar = new ICAL.Component(jcalData);
                const vevents = vcalendar.getAllSubcomponents('vevent');

                // Extraire les événements avec leurs propriétés
                return vevents.map(vevent => {
                    const event = new ICAL.Event(vevent);
                    return {
                        summary: event.summary,
                        start: event.startDate.toJSDate(),
                        end: event.endDate.toJSDate(),
                        component: vevent, // Conserver le composant pour les règles de répétition
                        rrule: event.component.getFirstPropertyValue('rrule') // Règle de répétition (si elle existe)
                    };
                });
            } catch (error) {
                console.error("Erreur lors du chargement du fichier ICS :", error);
                return [];
            }
        }

        // Fonction pour générer les occurrences des événements récurrents
        function genererOccurrences(events, dateDebut, dateFin) {
            const occurrences = [];

            events.forEach(event => {
                if (event.rrule) {
                    // Développer les occurrences pour les événements récurrents
                    const rule = new ICAL.RecurExpansion({
                        component: event.component,
                        dtstart: event.start
                    });
                    const nextOccurrences = rule.between(dateDebut, dateFin);

                    nextOccurrences.forEach(occurrence => {
                        const endDate = new Date(occurrence.toJSDate().getTime() + (event.end.getTime() - event.start.getTime()));
                        occurrences.push({
                            summary: event.summary,
                            start: occurrence.toJSDate(),
                            end: endDate
                        });
                    });
                } else {
                    // Ajouter les événements non récurrents
                    if (event.start >= dateDebut && event.start <= dateFin) {
                        occurrences.push(event);
                    }
                }
            });

            // Supprimer les doublons (si un événement récurrent a déjà une occurrence dans la période)
            const uniqueOccurrences = occurrences.reduce((acc, current) => {
                const isDuplicate = acc.some(event =>
                    event.summary === current.summary &&
                    event.start.getTime() === current.start.getTime()
                );
                if (!isDuplicate) {
                    acc.push(current);
                }
                return acc;
            }, []);

            return uniqueOccurrences.sort((a, b) => a.start - b.start);
        }

        // Fonction pour afficher les événements
        async function afficherAgenda() {
            const aujourdhui = new Date();
            aujourdhui.setHours(0, 0, 0, 0); // Début de la journée
            const demain = new Date(aujourdhui);
            demain.setDate(demain.getDate() + 1);
            const aprèsDemain = new Date(demain);
            aprèsDemain.setDate(aprèsDemain.getDate() + 1);

            // Mettre à jour les dates en h2
            document.getElementById('date-aujourdhui').textContent = formaterDate(aujourdhui);
            document.getElementById('date-demain').textContent = formaterDate(demain);

            // 🔥 Remplacez par l'URL de votre fichier ICS (obtenue depuis Google Agenda)
            const urlICS = 'https://calendar.google.com/calendar/ical/2d219aecd1294a5dc26a6e8290998a7891d598c3c61bf5ca6b0f2d73e0cf902a%40group.calendar.google.com/public/basic.ics';

            // Charger et parser les événements
            const events = await chargerEvenementsICS(urlICS);

            // Générer les occurrences pour aujourd'hui et demain
            const occurrences = genererOccurrences(events, aujourdhui, aprèsDemain);

            // Filtrer les événements pour aujourd'hui
            const evenementsAujourdhui = occurrences.filter(event =>
                event.start.toDateString() === aujourdhui.toDateString()
            );

            // Filtrer les événements pour demain
            const evenementsDemain = occurrences.filter(event =>
                event.start.toDateString() === demain.toDateString()
            );

            // Afficher les événements d'aujourd'hui
            const containerAujourdhui = document.getElementById('evenements-aujourdhui');
            containerAujourdhui.innerHTML = '';
            if (evenementsAujourdhui.length === 0) {
                containerAujourdhui.innerHTML = '<div class="vide">Aucun événement prévu aujourd\'hui.</div>';
            } else {
                evenementsAujourdhui.forEach(event => {
                    const div = document.createElement('div');
                    div.className = 'evenement';
                    div.innerHTML = `<span class="heure">${formaterHeure(event.start)} - ${formaterHeure(event.end)}</span>: ${event.summary || "Événement sans titre"}`;
                    containerAujourdhui.appendChild(div);
                });
            }

            // Afficher les événements de demain
            const containerDemain = document.getElementById('evenements-demain');
            containerDemain.innerHTML = '';
            if (evenementsDemain.length === 0) {
                containerDemain.innerHTML = '<div class="vide">Aucun événement prévu demain.</div>';
            } else {
                evenementsDemain.forEach(event => {
                    const div = document.createElement('div');
                    div.className = 'evenement';
                    div.innerHTML = `<span class="heure">${formaterHeure(event.start)} - ${formaterHeure(event.end)}</span>: ${event.summary || "Événement sans titre"}`;
                    containerDemain.appendChild(div);
                });
            }
        }

        // Rafraîchir l'affichage toutes les 15 minutes
        afficherAgenda();
        setInterval(afficherAgenda, 15 * 60 * 1000);
    </script>
</body>
</html>
